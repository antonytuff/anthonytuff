<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} | {{site_name}}</title>
  <meta name="description" content="{{description}}">
  <link rel="stylesheet" href="{{root}}static/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>></text></svg>">
</head>
<body>
  <header>
    <div class="container">
      <a href="{{root}}index.html" class="logo">&gt; {{site_name}}<span class="cursor">_</span></a>
      <nav>
        <a href="{{root}}blog.html" class="{{nav_blog}}">Blog</a>
        <a href="{{root}}writeups.html" class="{{nav_writeups}}">Writeups</a>
        <a href="{{root}}resume.html" class="{{nav_resume}}">Resume</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      {{content}}
    </div>
  </main>
  <footer>
    <div class="container">
      <p>Built with Python & Markdown | Hack the planet</p>
    </div>
  </footer>
</body>
</html>
